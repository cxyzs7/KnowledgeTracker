name: Daily Digest

on:
  schedule:
    - cron: "0 7 * * *"   # 07:00 UTC daily
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout KnowledgeTracker repo
        uses: actions/checkout@v4

      - name: Checkout Obsidian vault
        run: |
          git clone https://x-access-token:${{ secrets.VAULT_TOKEN }}@github.com/${{ secrets.VAULT_REPO }} vault
          echo "VAULT_PATH=$(pwd)/vault" >> $GITHUB_ENV

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run daily digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          VAULT_PATH: ${{ env.VAULT_PATH }}
        run: uv run python run.py daily

      - name: Push vault changes
        run: |
          cd vault
          git config user.email "actions@github.com"
          git config user.name "KnowledgeTracker Bot"
          git pull --rebase origin main
          git add .
          git diff --cached --quiet || git commit -m "chore: daily digest $(date -u +%Y-%m-%d)"
          git push origin main
